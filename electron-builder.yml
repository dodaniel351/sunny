appId: com.sunny.commandcenter
productName: Sunny
copyright: Copyright © 2026 David O'Daniel
directories:
  buildResources: build
  output: release/${version}
files:
  - out/**/*
  - package.json
  - '!**/*.{md,map}'
asarUnpack:
  # Native modules must live outside the asar so their .node binaries load.
  - '**/node_modules/better-sqlite3/**'
  - '**/node_modules/keytar/**'
  - '**/node_modules/sqlite-vec*/**'
extraResources:
  # Ship the app icon as a real file so the system-tray icon can load it at
  # runtime (build/ is buildResources and isn't inside the asar).
  - from: build/icon.png
    to: icon.png
electronLanguages:
  - en-US
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.productivity
  # Hardened runtime + these entitlements are required for notarization; they're
  # signing-time flags, so an unsigned test build (CSC_IDENTITY_AUTO_DISCOVERY=false)
  # ignores them.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # To NOTARIZE on the signing Mac: uncomment and set your Team ID, then export
  # APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER (App Store Connect API key)
  # — or APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID. Left off so an
  # initial unsigned smoke build works without credentials.
  # notarize:
  #   teamId: "YOURTEAMID"
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
linux:
  maintainer: David O'Daniel <dodaniel351@users.noreply.github.com>
  target:
    - deb
  category: Utility
  artifactName: ${productName}-${version}-${arch}.${ext}
deb:
  # Custom postinst that ALWAYS SUID-roots chrome-sandbox — the default probe
  # picks 0755 on Ubuntu 24.04 and the app then can't launch. See the script.
  afterInstall: build/linux/after-install.sh
npmRebuild: false
